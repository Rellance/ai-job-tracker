# Full local stack (alternative to managed Supabase + Upstash).
# Dev default in this project is managed services, but this compose gives
# Docker users prod-parity: web + worker + postgres + redis + mailpit.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aijobtracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI
    restart: unless-stopped

  web:
    build: .
    command: node server.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aijobtracker?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: node dist/worker.js # implemented at M4; image-shared with web
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aijobtracker?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
